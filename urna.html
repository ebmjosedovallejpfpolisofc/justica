<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Urna Eletrônica</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#d8d8d8;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
}

.urna{
width:1000px;
height:580px;
background:#ece8df;
border-radius:20px;
overflow:hidden;
display:flex;
box-shadow:
0 10px 40px rgba(0,0,0,.25);
}

.tela{
flex:1;
background:white;
padding:25px;
position:relative;
}

.lateral{
width:240px;
background:#ddd;
border-left:2px solid #bbb;
padding:20px;
display:flex;
align-items:flex-end;
}

.info{
background:white;
padding:15px;
border-radius:12px;
font-weight:bold;
width:100%;
}

.alerta{
background:#ffe082;
border:2px solid #d8a600;
padding:12px;
border-radius:12px;
font-weight:bold;
margin-bottom:15px;
display:none;
}

.bloqueada,
.matriculaScreen,
.votacaoScreen,
.fimScreen{
display:none;
width:100%;
height:100%;
}

.active{
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

.cadeado{
font-size:90px;
}

h1{
text-align:center;
}

.inputSenha,
.inputMatricula{
width:230px;
height:70px;
font-size:36px;
border:3px solid #333;
border-radius:12px;
margin-top:25px;
text-align:center;
letter-spacing:12px;
}

.erro{
color:red;
font-weight:bold;
margin-top:12px;
font-size:18px;
}

.cargo{
font-size:34px;
font-weight:bold;
}

.numero{
font-size:54px;
margin-top:25px;
letter-spacing:12px;
}

.candidato{
margin-top:20px;
display:flex;
gap:20px;
align-items:center;
}

.candidato img{
width:180px;
height:220px;
object-fit:cover;
border:2px solid #bbb;
}

.nomeCand{
font-size:30px;
font-weight:bold;
}

.partido{
font-size:22px;
margin-top:10px;
}

.instrucoes{
margin-top:25px;
font-size:22px;
}

.fimTexto{
font-size:110px;
font-weight:bold;
}

</style>
</head>
<body>

<div class="urna">

<div class="tela">

<div
id="mensagem"
class="alerta">
</div>

<!-- BLOQUEADA -->
<div
id="bloqueada"
class="bloqueada active">

<div class="cadeado">
🔒
</div>

<h1>
URNA BLOQUEADA
</h1>

<p>
DIGITE A SENHA
VERIFICADORA
</p>

<div style="
font-size:50px;
margin-top:10px;
">
🔐
</div>

<input
id="senhaInput"
class="inputSenha"
readonly
inputmode="none"
maxlength="4"
autocomplete="off"
/>

<div
id="erroSenha"
class="erro">
</div>

</div>

<!-- MATRICULA -->
<div
id="matriculaScreen"
class="matriculaScreen">

<h1>
DIGITE SUA
MATRÍCULA
</h1>

<input
id="matriculaInput"
class="inputMatricula"
readonly
inputmode="none"
autocomplete="off"
/>

<div
id="erroMatricula"
class="erro">
</div>

</div>

<!-- VOTAÇÃO -->
<div
id="votacaoScreen"
class="votacaoScreen">

<div
id="cargoNome"
class="cargo">
</div>

<div
id="numeroDigitado"
class="numero">
__
</div>

<div
id="dadosCandidato"
class="candidato">
</div>

<div class="instrucoes">
ENTER = CONFIRMAR<br>
. = CORRIGE<br>
BACKSPACE = APAGAR
</div>

</div>

<!-- FIM -->
<div
id="fimScreen"
class="fimScreen">

<div class="fimTexto">
FIM
</div>

<audio
id="somFim"
src="toque.mp3"
preload="auto">
</audio>

</div>

</div>

<div class="lateral">

<div class="info">

ENTER = CONFIRMAR

<br><br>

. = CORRIGE

<br><br>

BACKSPACE = APAGAR

</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
doc,
getDoc,
setDoc,
addDoc,
collection,
query,
where,
getDocs,
onSnapshot
}
from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyBS9T8rTIa_xDTX0TYrXx27GosNnnKQZgQ",

authDomain:
"urna-digitall.firebaseapp.com",

projectId:
"urna-digitall",

storageBucket:
"urna-digitall.firebasestorage.app",

messagingSenderId:
"483657741450",

appId:
"1:483657741450:web:4b1dc7da83fe2730f2a973"
};

const app =
initializeApp(
firebaseConfig
);

const db =
getFirestore(app);

const senhaInput =
document.getElementById(
"senhaInput"
);

const matriculaInput =
document.getElementById(
"matriculaInput"
);

const mensagem =
document.getElementById(
"mensagem"
);

const bloqueada =
document.getElementById(
"bloqueada"
);

const matriculaScreen =
document.getElementById(
"matriculaScreen"
);

const votacaoScreen =
document.getElementById(
"votacaoScreen"
);

const fimScreen =
document.getElementById(
"fimScreen"
);

let estado =
"senha";

let senhaDigitada =
"";

let matricula =
"";

let numeroAtual =
"";

let eleicaoId =
"";

let cargos = [];

let cargoAtual = 0;

let candidatoAtual =
null;

// tempo real
onSnapshot(
doc(db,"sistema","controle"),
async (snap)=>{

const data =
snap.data();

if(!data) return;

// mensagem
if(data.mensagem){

mensagem.style.display =
"block";

mensagem.textContent =
data.mensagem;

}else{

mensagem.style.display =
"none";
}

// eleição ativa
eleicaoId =
data.eleicaoAtiva || "";

// travar urna
if(data.travada === true){

resetarUrna();
}
});

async function
carregarCargos(){

if(!eleicaoId)
return;

const q =
query(
collection(
db,
"cargos"
),
where(
"eleicaoId",
"==",
eleicaoId
)
);

const snap =
await getDocs(q);

cargos = [];

snap.forEach(
(docu)=>{

cargos.push({
id:docu.id,
...docu.data()
});
});

cargos.sort(
(a,b)=>
(a.ordem||0)
-
(b.ordem||0)
);

cargoAtual = 0;

mostrarCargo();
}

function
mostrarCargo(){

if(
cargoAtual >=
cargos.length
){

finalizarVoto();
return;
}

numeroAtual =
"";

candidatoAtual =
null;

const cargo =
cargos[cargoAtual];

document
.getElementById(
"cargoNome"
)
.textContent =
cargo.nome;

document
.getElementById(
"numeroDigitado"
)
.textContent =
"_".repeat(
cargo.digitos
);

document
.getElementById(
"dadosCandidato"
)
.innerHTML =
"";
}

async function
buscarCandidato(){

const cargo =
cargos[cargoAtual];

if(
numeroAtual
.length
!== cargo.digitos
){
return;
}

const q =
query(
collection(
db,
"candidatos"
),
where(
"eleicaoId",
"==",
eleicaoId
),
where(
"cargoId",
"==",
cargo.id
),
where(
"numero",
"==",
numeroAtual
)
);

const snap =
await getDocs(q);

if(
snap.empty
){

candidatoAtual =
null;

document
.getElementById(
"dadosCandidato"
)
.innerHTML =
`
<h2 style="
color:red;
">
CANDIDATO
NÃO
ENCONTRADO
</h2>
`;

return;
}

const cand =
snap.docs[0];

candidatoAtual = {
id:cand.id,
...cand.data()
};

document
.getElementById(
"dadosCandidato"
)
.innerHTML =
`
<img src="${
candidatoAtual.foto || ""
}">

<div>

<div class="
nomeCand
">
${
candidatoAtual.nome
}
</div>

<div class="
partido
">
${
candidatoAtual.partido || ""
}
</div>

</div>
`;
}

async function
confirmarVoto(){

if(
!candidatoAtual
){
return;
}

const cargo =
cargos[cargoAtual];

await addDoc(
collection(
db,
"votos"
),
{
eleicaoId,
cargoId:
cargo.id,
cargoNome:
cargo.nome,
candidatoId:
candidatoAtual.id,
candidato:
candidatoAtual.nome,
numero:
candidatoAtual.numero,
matricula,
timestamp:
Date.now()
}
);

cargoAtual++;

mostrarCargo();
}

async function finalizarVoto(){

// marca matrícula usada
await setDoc(
doc(
db,
"matriculas",
matricula
),
{
usada:true,
eleicaoId,
timestamp:
Date.now()
}
);

// limpar mensagem
await setDoc(
doc(
db,
"sistema",
"controle"
),
{
mensagem:""
},
{
merge:true
}
);

// esconder votação
votacaoScreen
.classList
.remove(
"active"
);

// mostrar fim
fimScreen
.classList
.add(
"active"
);

// tocar som
document
.getElementById(
"somFim"
)
.play();

// voltar ao início
setTimeout(()=>{

fimScreen
.classList
.remove(
"active"
);

resetarUrna();

},3000);
}

function resetarUrna(){

estado =
"senha";

senhaDigitada =
"";

matricula =
"";

numeroAtual =
"";

candidatoAtual =
null;

cargoAtual =
0;

senhaInput
.value =
"";

matriculaInput
.value =
"";

document
.getElementById(
"dadosCandidato"
)
.innerHTML =
"";

document
.getElementById(
"numeroDigitado"
)
.textContent =
"__";

bloqueada
.classList
.add(
"active"
);

matriculaScreen
.classList
.remove(
"active"
);

votacaoScreen
.classList
.remove(
"active"
);

fimScreen
.classList
.remove(
"active"
);
}

// teclado físico
document
.addEventListener(
"keydown",
async (e)=>{

e.preventDefault();

// números
if(
/^[0-9]$/
.test(e.key)
){

// senha
if(
estado
===
"senha"
){

if(
senhaDigitada
.length
< 4
){

senhaDigitada +=
e.key;

senhaInput
.value =
senhaDigitada;
}

if(
senhaDigitada
.length
=== 4
){

const snap =
await getDoc(
doc(
db,
"sistema",
"controle"
)
);

const dados =
snap.data();

if(
dados.codigo
===
senhaDigitada
){

estado =
"matricula";

bloqueada
.classList
.remove(
"active"
);

matriculaScreen
.classList
.add(
"active"
);

}else{

document
.getElementById(
"erroSenha"
)
.textContent =
"SENHA INVÁLIDA";

setTimeout(
()=>{

document
.getElementById(
"erroSenha"
)
.textContent =
"";

},2000
);

senhaDigitada =
"";

senhaInput
.value =
"";
}
}
}

// matrícula
else if(
estado
===
"matricula"
){

matricula +=
e.key;

matriculaInput
.value =
matricula;
}

// votação
else if(
estado
===
"votacao"
){

const cargo =
cargos[
cargoAtual
];

if(
numeroAtual
.length
<
cargo.digitos
){

numeroAtual +=
e.key;

document
.getElementById(
"numeroDigitado"
)
.textContent =
numeroAtual;

buscarCandidato();
}
}
}

// apagar
if(
e.key
===
"Backspace"
){

if(
estado
===
"matricula"
){

matricula =
matricula
.slice(0,-1);

matriculaInput
.value =
matricula;
}

if(
estado
===
"votacao"
){

numeroAtual =
numeroAtual
.slice(0,-1);

document
.getElementById(
"numeroDigitado"
)
.textContent =
numeroAtual;
}
}

// corrige
if(
e.key
===
"."
&&
estado
===
"votacao"
){

numeroAtual =
"";

candidatoAtual =
null;

document
.getElementById(
"dadosCandidato"
)
.innerHTML =
"";

document
.getElementById(
"numeroDigitado"
)
.textContent =
"_".repeat(
cargos[
cargoAtual
]
.digitos
);
}

// enter
if(
e.key
===
"Enter"
){

// matrícula
if(
estado
===
"matricula"
){

const usado =
await getDoc(
doc(
db,
"matriculas",
matricula
)
);

if(
usado.exists()
){

document
.getElementById(
"erroMatricula"
)
.textContent =
"MATRÍCULA JÁ UTILIZADA";

return;
}

estado =
"votacao";

matriculaScreen
.classList
.remove(
"active"
);

votacaoScreen
.classList
.add(
"active"
);

await
carregarCargos();
}

// voto
else if(
estado
===
"votacao"
){

confirmarVoto();
}
}
});

document
.body
.focus();

window.onclick =
()=>{
document
.body
.focus();
};

</script>
</body>
</html>
