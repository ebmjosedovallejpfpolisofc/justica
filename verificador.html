<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Verificador da Urna</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#ececec;padding:20px}
.container{display:grid;grid-template-columns:380px 1fr;gap:20px}
.card{background:#fff;border-radius:18px;padding:20px;box-shadow:0 5px 20px rgba(0,0,0,.12)}
h1{margin-bottom:15px}
input,select,button{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;margin-top:8px;margin-bottom:12px}
button{cursor:pointer;font-weight:bold}
.codigo{font-size:42px;text-align:center;background:#f5f5f5;padding:20px;border-radius:16px;letter-spacing:10px;margin-bottom:12px}
video{width:100%;border-radius:18px;background:#000}
.lista{max-height:250px;overflow:auto;border:1px solid #ddd;padding:10px;border-radius:12px}
.item{padding:10px;border-bottom:1px solid #eee}
</style>
</head>
<body>
<div class="container">
  <div class="card">
    <h1>VERIFICADOR</h1>

    <label>Eleição ativa</label>
    <select id="eleicaoSelect"></select>

    <button id="ativarEleicao">ATIVAR ELEIÇÃO</button>

    <hr style="margin:16px 0">

    <h3>Código de liberação</h3>
    <div id="codigo" class="codigo">----</div>
    <button id="gerarCodigo">GERAR NOVO CÓDIGO</button>
    <button id="travarUrnas">TRAVAR URNAS</button>

    <hr style="margin:16px 0">

    <h3>Mensagem da urna</h3>
    <input id="mensagem" placeholder="Ex: João, sua vez de votar" />
    <button id="enviarMensagem">ENVIAR MENSAGEM</button>

    <hr style="margin:16px 0">

    <h3>Criar eleição</h3>
    <input id="nomeEleicao" placeholder="Nome da eleição" />
    <input id="tituloUrna" placeholder="Título da urna" />

    <label>Resultados</label>
    <select id="modoResultados">
      <option value="true">Em tempo real</option>
      <option value="false">Somente ao finalizar</option>
    </select>

    <button id="criarEleicao">CRIAR ELEIÇÃO</button>

    <h3>Cargos</h3>
    <input id="cargoNome" placeholder="Nome do cargo" />
    <input id="cargoDigitos" type="number" placeholder="Qtd. dígitos" />
    <button id="adicionarCargo">ADICIONAR CARGO</button>

    <div id="listaCargos" class="lista"></div>

    <h3>Candidatos</h3>
    <input id="candNome" placeholder="Nome do candidato" />
    <input id="candNumero" placeholder="Número do candidato" />
    <input id="candPartido" placeholder="Partido/Sigla" />
    <input id="candFoto" placeholder="URL da foto" />
    <select id="cargoCandidato"></select>

    <button id="adicionarCandidato">ADICIONAR CANDIDATO</button>
  </div>

  <div class="card">
    <h1>Câmera da urna (ao vivo)</h1>
    <video id="videoRemoto" autoplay playsinline></video>

    <hr style="margin:16px 0">

    <h2>Resultados</h2>
    <div id="resultados"></div>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js';
import {
getFirestore,
collection,
addDoc,
doc,
setDoc,
getDocs,
getDoc,
updateDoc,
onSnapshot,
query,
where
} from 'https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyBS9T8rTIa_xDTX0TYrXx27GosNnnKQZgQ',
  authDomain: 'urna-digitall.firebaseapp.com',
  projectId: 'urna-digitall',
  storageBucket: 'urna-digitall.firebasestorage.app',
  messagingSenderId: '483657741450',
  appId: '1:483657741450:web:4b1dc7da83fe2730f2a973'
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let eleicaoAtual = null;
let cargosTemp = [];

const codigoEl = document.getElementById('codigo');

function gerarCodigo4() {
  return Math.floor(1000 + Math.random() * 9000).toString();
}

async function carregarEleicoes() {
  const select = document.getElementById('eleicaoSelect');
  select.innerHTML = '';

  const snap = await getDocs(collection(db,'eleicoes'));
  snap.forEach(docu => {
    const op = document.createElement('option');
    op.value = docu.id;
    op.textContent = docu.data().nome;
    select.appendChild(op);
  });
}

await carregarEleicoes();

// Criar eleição
criarEleicao.onclick = async () => {
  const nome = nomeEleicao.value.trim();
  const titulo = tituloUrna.value.trim();
  const tempoReal = modoResultados.value === 'true';

  const ref = await addDoc(collection(db,'eleicoes'),{
    nome,
    titulo,
    ativa:false,
    encerrada:false,
    mostrarResultadosTempoReal: tempoReal,
    criadoEm: Date.now()
  });

  eleicaoAtual = ref.id;
  alert('Eleição criada');
  carregarEleicoes();
};

// Cargo
adicionarCargo.onclick = async () => {
  if(!eleicaoAtual) return alert('Crie uma eleição primeiro');

  const nome = cargoNome.value;
  const digitos = Number(cargoDigitos.value);

  const ref = await addDoc(collection(db,'cargos'),{
    eleicaoId: eleicaoAtual,
    nome,
    digitos,
    ordem: cargosTemp.length + 1
  });

  cargosTemp.push({id:ref.id,nome});

  listaCargos.innerHTML += `<div class="item">${nome} (${digitos} dígitos)</div>`;

  const option = document.createElement('option');
  option.value = ref.id;
  option.textContent = nome;
  cargoCandidato.appendChild(option);
};

// Candidato
adicionarCandidato.onclick = async () => {
  if(!eleicaoAtual) return alert('Crie uma eleição');

  await addDoc(collection(db,'candidatos'),{
    eleicaoId: eleicaoAtual,
    cargoId: cargoCandidato.value,
    nome: candNome.value,
    numero: candNumero.value,
    partido: candPartido.value,
    foto: candFoto.value
  });

  alert('Candidato adicionado');
};

// Ativar eleição
ativarEleicao.onclick = async () => {
  const id = eleicaoSelect.value;

  await setDoc(doc(db,'sistema','controle'),{
    eleicaoAtiva:id
  }, {merge:true});

  alert('Eleição ativada');
};

// Código
gerarCodigo.onclick = async () => {
  const codigo = gerarCodigo4();
  codigoEl.textContent = codigo;

  await setDoc(doc(db,'sistema','controle'),{
    codigo,
    travada:false
  },{merge:true});
};

// Travar
travarUrnas.onclick = async () => {
  await setDoc(doc(db,'sistema','controle'),{
    travada:true
  },{merge:true});
};

// Mensagem
enviarMensagem.onclick = async () => {
  await setDoc(doc(db,'sistema','controle'),{
    mensagem: mensagem.value
  },{merge:true});
};

// Resultados em tempo real
onSnapshot(collection(db,'votos'), async (snap) => {
  const box = document.getElementById('resultados');
  box.innerHTML = `<h3>Total de votos: ${snap.size}</h3>`;
});

// WebRTC base (receber stream)
const videoRemoto = document.getElementById('videoRemoto');
const remoteStream = new MediaStream();
videoRemoto.srcObject = remoteStream;

// Aqui entrará a conexão WebRTC completa
// recebendo vídeo da urna.html

</script>
</body>
</html>
