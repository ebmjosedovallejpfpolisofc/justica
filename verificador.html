<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Verificador</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#ececec;
padding:20px;
}

.container{
max-width:1300px;
margin:auto;
display:grid;
grid-template-columns:
1fr 1fr;
gap:20px;
}

.card{
background:white;
border-radius:16px;
padding:20px;
box-shadow:
0 5px 20px rgba(0,0,0,.15);
}

h1{
margin-bottom:15px;
}

input,
select,
button,
textarea{
width:100%;
padding:14px;
margin-top:10px;
border-radius:10px;
border:2px solid #ccc;
font-size:16px;
}

button{
cursor:pointer;
font-weight:bold;
}

.lista{
margin-top:20px;
border:2px solid #ddd;
border-radius:10px;
padding:10px;
max-height:250px;
overflow:auto;
}

.item{
padding:10px;
border-bottom:1px solid #ddd;
}

.codigo{
font-size:50px;
font-weight:bold;
text-align:center;
margin-top:15px;
letter-spacing:10px;
}

.votos{
margin-top:20px;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Criar Eleição</h1>

<input
id="nomeEleicao"
placeholder="Nome da eleição"
/>

<select id="modoResultado">
<option value="tempoReal">
Mostrar votos em tempo real
</option>

<option value="final">
Mostrar só no final
</option>
</select>

<button id="criarEleicao">
CRIAR ELEIÇÃO
</button>

</div>

<div class="card">

<h1>Controle</h1>

<div
id="codigo"
class="codigo">
----
</div>

<button id="gerarCodigo">
GERAR CÓDIGO
</button>

<button id="travarUrnas">
TRAVAR URNAS
</button>

<button id="encerrarVotacao">
ENCERRAR VOTAÇÃO
</button>

<textarea
id="mensagem"
placeholder="Mensagem da urna">
</textarea>

<button id="enviarMensagem">
ENVIAR MENSAGEM
</button>

</div>

<div class="card">

<h1>Cargos</h1>

<input
id="cargoNome"
placeholder="Nome do cargo"
/>

<input
id="cargoDigitos"
type="number"
placeholder="Qtd de dígitos"
/>

<button id="addCargo">
ADICIONAR CARGO
</button>

<div
id="listaCargos"
class="lista">
</div>

</div>

<div class="card">

<h1>Candidatos</h1>

<input
id="candNome"
placeholder="Nome"
/>

<input
id="candNumero"
placeholder="Número"
/>

<input
id="candPartido"
placeholder="Partido"
/>

<input
id="candFoto"
placeholder="URL da foto"
/>

<select
id="cargoSelect">
</select>

<button id="addCandidato">
ADICIONAR
</button>

<div
id="listaCand"
class="lista">
</div>

</div>

</div>

<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";

import {
getFirestore,
collection,
addDoc,
doc,
setDoc,
getDoc,
getDocs,
deleteDoc,
query,
where,
onSnapshot
}
from
"https://www.gstatic.com/firebasejs/12.1.0/firebase-firestore.js";

const firebaseConfig = {

apiKey:
"AIzaSyBS9T8rTIa_xDTX0TYrXx27GosNnnKQZgQ",

authDomain:
"urna-digitall.firebaseapp.com",

projectId:
"urna-digitall",

storageBucket:
"urna-digitall.firebasestorage.app",

messagingSenderId:
"483657741450",

appId:
"1:483657741450:web:4b1dc7da83fe2730f2a973"
};

const app =
initializeApp(
firebaseConfig
);

const db =
getFirestore(app);

let eleicaoAtual =
"";

function gerar4(){

return Math.floor(
1000 +
Math.random()*9000
).toString();
}

// criar eleição
document
.getElementById(
"criarEleicao"
)
.onclick =
async ()=>{

const nome =
document
.getElementById(
"nomeEleicao"
)
.value
.trim();

if(!nome){
alert(
"Digite o nome da eleição"
);
return;
}

const modo =
document
.getElementById(
"modoResultado"
)
.value;

const ref =
await addDoc(
collection(
db,
"eleicoes"
),
{
nome,
modo,
ativa:true,
encerrada:false,
criadaEm:
Date.now()
}
);

eleicaoAtual =
ref.id;

// ativa eleição
await setDoc(
doc(
db,
"sistema",
"controle"
),
{
eleicaoAtiva:
eleicaoAtual,
travada:true,
mensagem:"",
codigo:""
},
{
merge:true
}
);

alert(
"Eleição criada"
);
};

// adicionar cargo
document
.getElementById(
"addCargo"
)
.onclick =
async ()=>{

if(
!eleicaoAtual
){
alert(
"Crie a eleição primeiro"
);
return;
}

const nome =
document
.getElementById(
"cargoNome"
)
.value
.trim();

const digitos =
parseInt(
document
.getElementById(
"cargoDigitos"
)
.value
);

if(
!nome ||
!digitos
){
alert(
"Preencha tudo"
);
return;
}

await addDoc(
collection(
db,
"cargos"
),
{
eleicaoId:
eleicaoAtual,
nome,
digitos,
ordem:
Date.now()
}
);

document
.getElementById(
"cargoNome"
)
.value =
"";

document
.getElementById(
"cargoDigitos"
)
.value =
"";
};

// listar cargos
onSnapshot(
collection(
db,
"cargos"
),
(snapshot)=>{

const lista =
document
.getElementById(
"listaCargos"
);

const select =
document
.getElementById(
"cargoSelect"
);

lista.innerHTML =
"";

select.innerHTML =
"";

snapshot
.docs
.filter(docu=>
docu.data()
.eleicaoId
===
eleicaoAtual
)
.forEach(docu=>{

const data =
docu.data();

lista.innerHTML +=
`
<div class="item">
${data.nome}
(${data.digitos}
dígitos)
</div>
`;

select.innerHTML +=
`
<option
value="${docu.id}">
${data.nome}
</option>
`;
});
});

// adicionar candidato
document
.getElementById(
"addCandidato"
)
.onclick =
async ()=>{

if(
!eleicaoAtual
){
alert(
"Crie eleição"
);
return;
}

const nome =
document
.getElementById(
"candNome"
)
.value
.trim();

const numero =
document
.getElementById(
"candNumero"
)
.value
.trim();

const partido =
document
.getElementById(
"candPartido"
)
.value
.trim();

const foto =
document
.getElementById(
"candFoto"
)
.value
.trim();

const cargoId =
document
.getElementById(
"cargoSelect"
)
.value;

if(
!nome ||
!numero ||
!cargoId
){
alert(
"Preencha tudo"
);
return;
}

await addDoc(
collection(
db,
"candidatos"
),
{
eleicaoId:
eleicaoAtual,
cargoId,
nome,
numero,
partido,
foto
}
);

document
.getElementById(
"candNome"
)
.value =
"";

document
.getElementById(
"candNumero"
)
.value =
"";

document
.getElementById(
"candPartido"
)
.value =
"";

document
.getElementById(
"candFoto"
)
.value =
"";
};

// listar candidatos
onSnapshot(
collection(
db,
"candidatos"
),
(snapshot)=>{

const lista =
document
.getElementById(
"listaCand"
);

lista.innerHTML =
"";

snapshot
.docs
.filter(docu=>
docu.data()
.eleicaoId
===
eleicaoAtual
)
.forEach(docu=>{

const data =
docu.data();

lista.innerHTML +=
`
<div class="item">
<b>
${data.nome}
</b>

<br>

Número:
${data.numero}

<br>

${data.partido || ""}
</div>
`;
});
});

// gerar código
document
.getElementById(
"gerarCodigo"
)
.onclick =
async ()=>{

const codigo =
gerar4();

document
.getElementById(
"codigo"
)
.textContent =
codigo;

await setDoc(
doc(
db,
"sistema",
"controle"
),
{
codigo,
travada:false
},
{
merge:true
}
);
};

// travar urnas
document
.getElementById(
"travarUrnas"
)
.onclick =
async ()=>{

await setDoc(
doc(
db,
"sistema",
"controle"
),
{
travada:true
},
{
merge:true
}
);

alert(
"Urnas travadas"
);
};

// enviar mensagem
document
.getElementById(
"enviarMensagem"
)
.onclick =
async ()=>{

const texto =
document
.getElementById(
"mensagem"
)
.value
.trim();

await setDoc(
doc(
db,
"sistema",
"controle"
),
{
mensagem:texto
},
{
merge:true
}
);

alert(
"Mensagem enviada"
);
};

// encerrar votação
document
.getElementById(
"encerrarVotacao"
)
.onclick =
async ()=>{

if(
!eleicaoAtual
){
alert(
"Sem eleição ativa"
);
return;
}

// trava tudo
await setDoc(
doc(
db,
"sistema",
"controle"
),
{
travada:true,
mensagem:"",
eleicaoAtiva:"",
codigo:""
},
{
merge:true
}
);

// reativar matrículas
const mats =
await getDocs(
collection(
db,
"matriculas"
)
);

for(
const mat of
mats.docs
){

const data =
mat.data();

if(
data.eleicaoId
===
eleicaoAtual
){

await deleteDoc(
doc(
db,
"matriculas",
mat.id
)
);
}
}

// encerrar eleição
await setDoc(
doc(
db,
"eleicoes",
eleicaoAtual
),
{
encerrada:true,
ativa:false
},
{
merge:true
}
);

alert(
"Votação encerrada"
);
};

// votos tempo real
onSnapshot(
collection(
db,
"votos"
),
(snapshot)=>{

getDoc(
doc(
db,
"eleicoes",
eleicaoAtual
)
)
.then((eleicao)=>{

if(
!eleicao.exists()
) return;

const modo =
eleicao.data()
.modo;

if(
modo
!==
"tempoReal"
){
return;
}

let html =
"<h2>Votos</h2>";

snapshot
.docs
.filter(docu=>
docu.data()
.eleicaoId
===
eleicaoAtual
)
.forEach(docu=>{

const voto =
docu.data();

html +=
`
<div class="item">
${voto.cargoNome}
<br>
${voto.candidato}
(
${voto.numero}
)
</div>
`;
});

let box =
document
.getElementById(
"votosTempoReal"
);

if(!box){

box =
document
.createElement(
"div"
);

box.id =
"votosTempoReal";

box.className =
"card votos";

document
.querySelector(
".container"
)
.appendChild(
box
);
}

box.innerHTML =
html;

});
});

</script>
</body>
</html>
